<h2>Acerque su tarjeta RFID</h2>

<p id="estado">Esperando tarjeta...</p>

<input id="uid" placeholder="Simular UID">

<button onclick="simular()">Simular RFID</button>

<script src="api.js"></script>
<script>
function simular() {
  const user = JSON.parse(localStorage.getItem("user"));

  fetch(`${API_URL}/rfid`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      uid: uid.value,
      cedula: user.cedula
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("estado").innerText = data.msg;
  });
}
</script>
