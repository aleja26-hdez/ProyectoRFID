<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login RFID - Turnos</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      color: red;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🔐 Ingreso al Sistema RFID</h2>

  <!-- LOGIN SOLO CÉDULA -->
  <input type="text" id="cedula" placeholder="Ingrese su cédula">

  <button onclick="login()">Entrar</button>

  <p id="msg"></p>

</div>

<script>
const API_URL = "https://proyectorfid-2.onrender.com";

// 🔐 LOGIN SOLO CON CÉDULA
function login() {
  const cedulaValue = document.getElementById("cedula").value;

  fetch(`${API_URL}/login-cedula`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      cedula: cedulaValue
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.ok) {
      // guardar usuario en sesión
      localStorage.setItem("user", JSON.stringify(data.user));

      // ir a selección de servicios
      window.location.href = "services.html";
    } else {
      document.getElementById("msg").innerText = data.msg;
    }
  })
  .catch(err => {
    document.getElementById("msg").innerText = "Error de conexión";
  });
}
</script>

</body>
</html>
