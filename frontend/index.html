<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema RFID - Turnos</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    table, th, td {
      border: 1px solid #ddd;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🚀 Sistema RFID Turnos</h1>

  <!-- FORMULARIO -->
  <h3>Registrar Usuario</h3>

  <input type="text" id="nombre" placeholder="Nombre">
  <input type="text" id="apellido" placeholder="Apellido">
  <input type="text" id="cedula" placeholder="Cédula">

  <button onclick="crearUsuario()">Guardar</button>

  <!-- TABLA -->
  <h3>Usuarios Registrados</h3>

  <button onclick="cargarUsuarios()">Cargar Usuarios</button>

  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Cédula</th>
      </tr>
    </thead>
    <tbody id="tablaUsuarios"></tbody>
  </table>

</div>

<script>
const API_URL = "https://proyectorfid-2.onrender.com"; // 👈 cambia esto

// 🔹 OBTENER USUARIOS
function cargarUsuarios() {
  fetch(`${API_URL}/usuarios`)
    .then(res => res.json())
    .then(data => {
      const tabla = document.getElementById("tablaUsuarios");
      tabla.innerHTML = "";

      data.forEach(u => {
        tabla.innerHTML += `
          <tr>
            <td>${u.nombre}</td>
            <td>${u.apellido}</td>
            <td>${u.cedula}</td>
          </tr>
        `;
      });
    })
    .catch(err => console.log(err));
}

// 🔹 CREAR USUARIO
function crearUsuario() {
  const nombre = document.getElementById("nombre").value;
  const apellido = document.getElementById("apellido").value;
  const cedula = document.getElementById("cedula").value;

  fetch(`${API_URL}/usuarios`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nombre,
      apellido,
      cedula
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Usuario creado ✔");
    cargarUsuarios();
  })
  .catch(err => console.log(err));
}

// 🔥 cargar al iniciar
cargarUsuarios();
</script>

</body>
</html>
